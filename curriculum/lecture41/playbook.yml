---
- name: "로컬 실습과 AWS EC2/VPC/SG 매핑"
  hosts: all
  become: true
  gather_facts: true
  vars:
    lecture_id: "lecture41"
    lecture_title: "로컬 실습과 AWS EC2/VPC/SG 매핑"
    install_enabled: false
    reference_playbook: "../../playbooks/20_aws_create_vpc.yml"
    lecture_packages:
      - python3
      - jq
      - graphviz
      - curl
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"

    - name: Install lecture packages when enabled
      ansible.builtin.package:
        name: "{{ lecture_packages }}"
        state: present
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout
