---
- name: "Ingress와 외부 트래픽 라우팅"
  hosts: all
  become: true
  gather_facts: true
  vars:
    lecture_id: "lecture37"
    lecture_title: "Ingress와 외부 트래픽 라우팅"
    install_enabled: false
    reference_playbook: "../../playbooks/13_blue_green_switch.yml"
    lecture_packages:
      - python3
      - curl
      - jq
      - ca-certificates
      - apt-transport-https
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"

    - name: Install lecture packages when enabled
      ansible.builtin.package:
        name: "{{ lecture_packages }}"
        state: present
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout
