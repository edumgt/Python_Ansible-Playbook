---
- name: "AWS 실습 자원 정리 자동화"
  hosts: all
  become: true
  gather_facts: true
  vars:
    lecture_id: "lecture25"
    lecture_title: "AWS 실습 자원 정리 자동화"
    install_enabled: false
    reference_playbook: "../../playbooks/23_aws_cleanup.yml"
    lecture_packages:
      - python3
      - python3-boto3
      - python3-botocore
      - awscli
      - jq
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"

    - name: Install lecture packages when enabled
      ansible.builtin.package:
        name: "{{ lecture_packages }}"
        state: present
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout
