lecture:
  id: lecture40
  order: 40
  title: Horizon 콘솔 운영 흐름과 IAM 관점
  module: cloud_mapping
  level: intermediate
  duration_minutes: 120
  tags:
  - openstack
  - horizon
prerequisites:
- lecture39 완료 또는 동등한 실무 경험
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Horizon 콘솔 운영 흐름과 IAM 관점 주제를 Ansible 중심으로 설명할 수 있다.
- 강의별 설치 및 점검 절차를 YAML 문서 기반으로 수행할 수 있다.
- 실습 결과를 AI 코치 프롬프트로 리뷰하고 개선할 수 있다.
curriculum:
  theory:
  - '핵심 개념 30분: 정의, 동작 원리, 실패 패턴'
  - '구조 이해 20분: 현재 리포 파일/디렉터리 매핑'
  practice:
  - '실습 50분: lecture playbook 실행 및 결과 검증'
  - '회고 20분: AI와 함께 오류 원인/개선안 정리'
tech_stack:
  required:
  - aws
  - openstack-concepts
  - ansible
  - networking
  optional:
  - drawio
  - graphviz
  - markdown
installation_plan:
  target_inventory: ../../inventories/local/hosts.ini
  target_host_group: all
  approach:
  - '사전 점검: Python/SSH/권한 확인'
  - 필수 패키지 설치는 playbook.yml에서 install_enabled=true일 때 실행
  - 강의 종료 후 상태 점검 태스크로 검증
  packages:
  - python3
  - jq
  - graphviz
  - curl
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../../playbooks/aws_outputs.yml
  run_examples:
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../../inventories/local/hosts.ini ../../playbooks/aws_outputs.yml
ai_pairing:
  pre_lab_prompt: Horizon 콘솔 운영 흐름과 IAM 관점 실습 전에 실패할 수 있는 지점 3개를 체크리스트로 만들어줘.
  during_lab_prompt: 현재 실행 로그를 보고 원인-증상-조치 순서로 트러블슈팅 가이드를 작성해줘.
  retrospective_prompt: 이번 강의에서 배운 자동화 패턴을 다음 강의에 재사용할 수 있게 YAML 템플릿으로 정리해줘.
deliverables:
- 강의 실행 로그 또는 스크린샷 1개 이상
- AI 회고 노트(markdown) 1개
validation:
- playbook syntax error 없음
- 핵심 태스크 결과를 debug 출력으로 확인
advanced_integration:
  track_id: 12-7
  track_name: OpenStack 입문 체험(MicroStack/DevStack/Kolla Ansible)
  track_doc: ../../curriculum/advanced_tracks.yml
  integration_objective: Horizon 콘솔 운영 흐름과 IAM 관점 학습 결과를 OpenStack 입문 체험 순서(MicroStack
    -> DevStack -> Kolla Ansible)와 연결한다.
  addon_practice:
  - MicroStack에서 Projects/Instances/Images/Networks/Volumes 메뉴를 순회하며 리소스 흐름 확인
  - DevStack과 Kolla Ansible에서 Horizon UI 조작 결과를 Keystone/Nova/Neutron 서비스와 매핑
  developer_view:
    backend: Horizon 요청이 Keystone 인증과 Nova/Neutron API 호출로 이어지는 흐름 이해
    frontend: 대시보드 화면 변화와 실제 리소스 상태를 연결해 운영 관점 강화
  aws_bridge: Horizon 콘솔 흐름을 AWS Console의 IAM/EC2/VPC/EBS 화면 전환과 대응해 설명한다.
  recommended_advanced_order:
  - 12-1
  - 12-5
  - 12-4
  - 12-3
  - 12-2
  - 12-6
  - 12-7
  - 12-8
  ai_extension_prompt: 현재 강의(Horizon 콘솔 운영 흐름과 IAM 관점) 결과를 MicroStack -> DevStack
    -> Kolla Ansible 순서로 확장하는 콘솔 기반 실습 체크리스트를 YAML로 작성해줘.
