lecture:
  id: lecture34
  order: 34
  title: k3s 서버 노드 준비 자동화 설계
  module: k8s_ops
  level: intermediate
  duration_minutes: 120
  tags:
  - kubernetes
  - k3s
  - server
prerequisites:
- lecture33 완료 또는 동등한 실무 경험
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- k3s 서버 노드 준비 자동화 설계 주제를 Ansible 중심으로 설명할 수 있다.
- 강의별 설치 및 점검 절차를 YAML 문서 기반으로 수행할 수 있다.
- 실습 결과를 AI 코치 프롬프트로 리뷰하고 개선할 수 있다.
curriculum:
  theory:
  - '핵심 개념 30분: 정의, 동작 원리, 실패 패턴'
  - '구조 이해 20분: 현재 리포 파일/디렉터리 매핑'
  practice:
  - '실습 50분: lecture playbook 실행 및 결과 검증'
  - '회고 20분: AI와 함께 오류 원인/개선안 정리'
tech_stack:
  required:
  - k3s
  - kubectl
  - containerd
  - yaml
  optional:
  - helm
  - k9s
  - metrics-server
installation_plan:
  target_inventory: ../../inventories/local/hosts.ini
  target_host_group: all
  approach:
  - '사전 점검: Python/SSH/권한 확인'
  - 필수 패키지 설치는 playbook.yml에서 install_enabled=true일 때 실행
  - 강의 종료 후 상태 점검 태스크로 검증
  packages:
  - python3
  - curl
  - jq
  - ca-certificates
  - apt-transport-https
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../../playbooks/10_docker_engine_install.yml
  run_examples:
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../../inventories/local/hosts.ini ../../playbooks/10_docker_engine_install.yml
ai_pairing:
  pre_lab_prompt: k3s 서버 노드 준비 자동화 설계 실습 전에 실패할 수 있는 지점 3개를 체크리스트로 만들어줘.
  during_lab_prompt: 현재 실행 로그를 보고 원인-증상-조치 순서로 트러블슈팅 가이드를 작성해줘.
  retrospective_prompt: 이번 강의에서 배운 자동화 패턴을 다음 강의에 재사용할 수 있게 YAML 템플릿으로 정리해줘.
deliverables:
- 강의 실행 로그 또는 스크린샷 1개 이상
- AI 회고 노트(markdown) 1개
validation:
- playbook syntax error 없음
- 핵심 태스크 결과를 debug 출력으로 확인
advanced_integration:
  track_id: 12-8
  track_name: k3s 대신 kubeadm 또는 managed EKS 확장 비교
  track_doc: ../../curriculum/advanced_tracks.yml
  integration_objective: k3s 서버 노드 준비 자동화 설계 학습 결과를 k3s 대신 kubeadm 또는 managed EKS
    확장 비교 확장 시나리오와 연결한다.
  addon_practice:
  - 같은 앱의 k3s 배포 검증
  - EKS에서 AWS 관리 영역과 사용자 관리 영역 분리 정리
  developer_view:
    backend: 내 앱에서 내가 관리할 범위의 경계 이해
    frontend: 배포 대상 변화와 운영 책임 경계 변화 이해
  aws_bridge: k3s는 쿠버네티스 개념 학습용
  recommended_advanced_order:
  - 12-1
  - 12-5
  - 12-4
  - 12-3
  - 12-2
  - 12-6
  - 12-7
  - 12-8
  ai_extension_prompt: 현재 강의(k3s 서버 노드 준비 자동화 설계) 결과를 k3s 대신 kubeadm 또는 managed EKS
    확장 비교 실습으로 확장하는 체크리스트를 YAML로 작성해줘.
