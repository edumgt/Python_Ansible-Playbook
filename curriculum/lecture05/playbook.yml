---
- name: "loop, when, block 제어문 실습"
  hosts: all
  become: true
  gather_facts: true
  vars:
    lecture_id: "lecture05"
    lecture_title: "loop, when, block 제어문 실습"
    install_enabled: false
    reference_playbook: "../../playbooks/learning/03_loop_when.yml"
    lecture_packages:
      - python3
      - python3-pip
      - openssh-client
      - sshpass
      - git
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"

    - name: Install lecture packages when enabled
      ansible.builtin.package:
        name: "{{ lecture_packages }}"
        state: present
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout
