lecture:
  id: lecture19
  order: 19
  title: 'Kolla Ansible 배포 준비와 검증'
  module: openstack_operations
  level: intermediate
  duration_minutes: 60
  tags:
  - openstack
  - kolla-ansible
  - openstack-helm
  - deployment
prerequisites:
- lecture18 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Kolla Ansible 배포 전 사전 점검 항목을 정리한다.
- 컨테이너 기반 OpenStack 제어평면 구성 개념을 이해한다.
- 배포 후 검증 항목(keystone/nova/neutron/horizon)을 정의한다.
- OpenStack-Helm 사전 점검 항목(쿠버네티스/Helm CLI)을 비교 관점으로 정리한다.
external_reference:
- 'https://genonai.notion.site/OpenStack-Helm-31bfea8aef3c8173a9a1e7dc35a13c73'
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
  - kubectl
  - helm
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
  - docker.io
  - apt-transport-https
  - ca-certificates
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/10_docker_engine_install.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false -e helm_preflight_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/10_docker_engine_install.yml
